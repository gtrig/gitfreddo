<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitFredo</title>
    <script>
      try {
        var theme = localStorage.getItem('gitfredo:theme')
        if (theme === 'dark' || theme === 'freddo') {
          document.documentElement.dataset.theme = theme
        }
      } catch (e) {}
    </script>
  </head>
  <body class="bg-gf-bg text-gf-fg">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
