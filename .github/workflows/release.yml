name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: linux
          - os: macos-latest
            platform: mac
            artifact: macos
          - os: windows-latest
            platform: win
            artifact: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Electron (Linux)
        if: matrix.platform == 'linux'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-linux-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-linux-

      - name: Cache Electron (Windows)
        if: matrix.platform == 'win'
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-windows-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-windows-

      - name: Cache Electron (macOS)
        if: matrix.platform == 'mac'
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-macos-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-macos-

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: npm version "${{ github.ref_name }}" --no-git-tag-version --allow-same-version

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run dist:${{ matrix.platform }} -- --publish never

      - uses: actions/upload-artifact@v7
        with:
          name: gitfreddo-${{ matrix.artifact }}
          path: |
            release/**
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.dmg
            artifacts/*.exe
