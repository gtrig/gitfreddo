name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: linux
          - os: windows-latest
            platform: win
            artifact: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Electron (Linux)
        if: matrix.platform == 'linux'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-linux-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-linux-

      - name: Cache Electron (Windows)
        if: matrix.platform == 'win'
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-windows-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-windows-

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - run: npm ci
      - run: npm run dist:${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        with:
          name: gitfredo-${{ matrix.artifact }}
          path: |
            release/**
          if-no-files-found: error
